spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:notification-db}:5432/${DB_NAME:notifications}
    username: ${DB_USER:notify}
    password: ${DB_PASSWORD:notify_secret}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:rabbit}
    password: ${RABBITMQ_PASSWORD:rabbit_secret}
    virtual-host: ${RABBITMQ_VHOST:openmrs}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3s
          max-attempts: 5
          multiplier: 2.0
          max-interval: 30s

# ── Security ──────────────────────────────────────────────────────────────────
# AES-256-GCM key (base64-encoded 32 bytes). Set DB_ENCRYPTION_KEY in production.
# Dev fallback is set in AesEncryptionService (never hardcode in prod).
encryption:
  key: ${DB_ENCRYPTION_KEY:}

# Admin API key for /api/admin/** endpoints. Set SAAS_ADMIN_KEY in production.
saas:
  admin-key: ${SAAS_ADMIN_KEY:admin-secret}

# ── FakeComWorld ───────────────────────────────────────────────────────────────
fakecomworld:
  base-url:      ${FAKECOMWORLD_BASE_URL:http://fakecomworld:8080}
  student-group: ${STUDENT_GROUP_HEADER:group-1}

# ── Poller ─────────────────────────────────────────────────────────────────────
poller:
  interval:
    fixed-delay-ms:   ${POLLER_INTERVAL_MS:120000}   # 2 min
    initial-delay-ms: 30000

# ── Reconciler ─────────────────────────────────────────────────────────────────
reconciler:
  poll:
    fixed-delay-ms:   ${RECONCILER_INTERVAL_MS:300000}  # 5 min
    initial-delay-ms: 60000

# ── Outbox relay ───────────────────────────────────────────────────────────────
outbox:
  relay:
    fixed-delay-ms:   30000
    initial-delay-ms: 15000

# ── Reminder dispatch ──────────────────────────────────────────────────────────
reminder:
  dispatch:
    interval-ms:     60000
    initial-delay-ms: 30000

# ── AsyncFlow status polling ───────────────────────────────────────────────────
asyncflow:
  poll:
    interval-ms: 10000

# ── RabbitMQ queue names ───────────────────────────────────────────────────────
rabbitmq:
  queue:
    appointments: appointments
    cancelled:    appointment.cancelled

# ── Loki logging (via logback-loki appender) ──────────────────────────────────
loki:
  url: ${LOKI_URL:http://loki:3100/loki/api/v1/push}

# ── Mock provider (disabled — only used for local testing without FakeComWorld) ─
mock:
  messaging:
    enabled: false

# ── Actuator ──────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080
  error:
    include-message: never
    include-stacktrace: never
    include-exception: false
    include-binding-errors: never
