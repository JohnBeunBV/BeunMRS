version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BeunMRS Communication Platform — SaaS Isolated Core Stack (No Local OpenMRS)
# Command: docker compose -f docker-compose.saas.yml up --build -d
# Deploys only the core multi-tenant system. Hospitals register their own
# self-hosted external OpenMRS endpoint coordinates via the frontend portal.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  broker-net:
    driver: bridge
  notification-net:
    driver: bridge
  observability-net:
    driver: bridge

volumes:
  notification-pg-data:
  rabbitmq-data:
  loki-data:
  grafana-data:

services:

  # ── Core SaaS Message Broker (RabbitMQ) ────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions/topology.json:/etc/rabbitmq/definitions/topology.json
      - ./infra/rabbitmq/config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - broker-net
      - notification-net
      - observability-net
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Core SaaS Multi-Tenant Database (PostgreSQL) ───────────────────────────
  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME}
      POSTGRES_USER: ${NOTIFICATION_DB_USER}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
    volumes:
      - notification-pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - notification-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER} -d ${NOTIFICATION_DB_NAME}"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Core SaaS Notification Engine (Spring Boot) ────────────────────────────
  notification-svc:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-svc
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_HOST: notification-db
      DB_NAME: ${NOTIFICATION_DB_NAME}
      DB_USER: ${NOTIFICATION_DB_USER}
      DB_PASSWORD: ${NOTIFICATION_DB_PASSWORD}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST}
      # Dynamic Polling Core: Instructs service to poll remote IPs registered by individual tenants
      OPENMRS_BASE_URL: "DYNAMIC_TENANT_MAPPED"
      FAKECOMWORLD_BASE_URL: http://fakecomworld:8080
      STUDENT_GROUP_HEADER: ${STUDENT_GROUP}
      SWIFTSEND_API_KEY: ${SWIFTSEND_API_KEY}
      SECUREPOST_CLIENT_ID: ${SECUREPOST_CLIENT_ID}
      SECUREPOST_CLIENT_SECRET: ${SECUREPOST_CLIENT_SECRET}
      LEGACYLINK_USERNAME: ${LEGACYLINK_USERNAME}
      LEGACYLINK_PASSWORD: ${LEGACYLINK_PASSWORD}
      ASYNCFLOW_API_KEY: ${ASYNCFLOW_API_KEY}
      LOKI_URL: http://loki:3100/loki/api/v1/push
    networks:
      - notification-net
      - broker-net
      - observability-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        tag: "notification-svc"

  # ── Secure API Reverse Proxy (Nginx with TLS 1.3) ──────────────────────────
  notification-nginx:
    build:
      context: ./infra/nginx
      dockerfile: Dockerfile
    container_name: notification-nginx
    restart: unless-stopped
    depends_on:
      notification-svc:
        condition: service_healthy
    networks:
      - notification-net
    ports:
      - "${NOTIFICATION_PORT}:443"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--no-check-certificate", "https://localhost/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Mock Messaging Providers Platform (FakeComWorld) ──────────────────────
  fakecomworld:
    image: ghcr.io/avansict/in2.4-fakecomworld:main
    container_name: fakecomworld
    restart: unless-stopped
    environment:
      SwiftSend__ApiKey: ${SWIFTSEND_API_KEY}
      SwiftSend__RateLimit: 20
      SwiftSend__RateLimitWindowInSeconds: 60
      SwiftSend__MaxDelayInMilliseconds: 2000
      SwiftSend__FaultInjectionRatePercentage: 10
      SecurePost__ClientId: ${SECUREPOST_CLIENT_ID}
      SecurePost__ClientSecret: ${SECUREPOST_CLIENT_SECRET}
      SecurePost__JwtSecret: ${SECUREPOST_JWT_SECRET}
      SecurePost__JwtExpiryInMinutes: 3
      SecurePost__RateLimitAuth: 3
      SecurePost__RateLimitMessage: 10
      SecurePost__RateLimitWindowInSeconds: 60
      SecurePost__FaultInjectionRatePercentage: 10
      LegacyLink__Username: ${LEGACYLINK_USERNAME}
      LegacyLink__Password: ${LEGACYLINK_PASSWORD}
      LegacyLink__MinDelayInMilliseconds: 100
      LegacyLink__MaxDelayInMilliseconds: 3000
      AsyncFlow__ApiKey: ${ASYNCFLOW_API_KEY}
      AsyncFlow__RateLimit: 20
      AsyncFlow__RateLimitWindowInSeconds: 60
      AsyncFlow__ProcessingIntervalInSeconds: 5
      AsyncFlow__MinProcessingDelayInSeconds: 2
      AsyncFlow__MaxProcessingDelayInSeconds: 15
      AsyncFlow__FailureRatePercentage: 5
    networks:
      - notification-net
      - observability-net
    ports:
      - "1337:8080"
    logging:
      driver: json-file
      options:
        tag: "fakecomworld"

  # ── Observability & Monitoring Infrastructure ─────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    restart: unless-stopped
    command: --config.file=/etc/prometheus/prometheus.yml --storage.tsdb.retention.time=7d
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - observability-net
      - notification-net
    ports:
      - "9090:9090"

  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./infra/loki/loki-config.yml:/etc/loki/loki-config.yml
      - loki-data:/loki
    networks:
      - observability-net
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  promtail:
    image: grafana/promtail:3.3.2
    container_name: promtail
    restart: unless-stopped
    volumes:
      - ./infra/promtail/promtail-config.yml:/etc/promtail/config.yml
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    networks:
      - observability-net
    depends_on:
      loki:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - observability-net
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Multi-Tenant SaaS Registration Portal Frontend ─────────────────────────
  notification-frontend:
    build:
      context: ./frontend
    container_name: notification-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT}:443"
    networks:
      - notification-net
    depends_on:
      notification-svc:
        condition: service_healthy