# ─────────────────────────────────────────────────────────────────────────────
# NFR-5b: TLS 1.3 voor transport — NGINX reverse proxy voor notification-svc
# Cert: self-signed (dev/demo) — in productie vervangen door Let's Encrypt
# ─────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    server_name localhost;

    # Certificaat (gegenereerd in Dockerfile bij build-tijd)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # NFR-5b: uitsluitend TLS 1.3 — geen oudere protocollen
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers (defence-in-depth)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;

    # Proxy naar notification-svc (intern Docker-netwerk, plain HTTP is ok)
    location / {
        proxy_pass         http://notification-svc:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_read_timeout 30s;
    }
}
