# rabbitmq.conf
# Loaded by the rabbitmq container at startup.

# Reduce memory high-watermark for smaller VMs (adjust for your host)
vm_memory_high_watermark.relative = 0.4

# Persist messages to disk aggressively
queue_index_embed_msgs_below = 0

# Enable the definitions file so exchanges/queues are pre-seeded
load_definitions = /etc/rabbitmq/definitions/topology.json

# Heartbeat — keep connections alive through firewalls
heartbeat = 60

# Logging
log.console = true
log.console.level = info
