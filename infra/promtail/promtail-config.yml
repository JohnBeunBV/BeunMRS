server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Scrape all Docker container logs via the Docker socket
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the service label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
      # Keep the Docker log tag if set
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      # Add container image as label (useful for OpenMRS vs notification-svc)
      - source_labels: [__meta_docker_container_image]
        target_label: image
    pipeline_stages:
      # Try to parse JSON log lines (Spring Boot / logback-json).
      # OpenMRS logs are plain-text — json stage fails silently and the
      # original line is kept, so both formats work without an output stage.
      - json:
          expressions:
            level:   level
            logger:  logger
            message: message
      # Only promote labels when they were actually extracted (non-empty)
      - labels:
          level:
          logger:
      # NOTE: no `output` stage here — that would overwrite plain-text lines
      # (e.g. OpenMRS / Tomcat) with an empty string and make them invisible.
