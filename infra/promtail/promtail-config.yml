server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:

  # Scrape all Docker container logs via the Docker socket
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use container name as the service label
      - source_labels: [__meta_docker_container_name]
        regex: /(.*)
        target_label: service
      # Keep the Docker log tag if set
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      # Add container image as label (useful for OpenMRS vs notification-svc)
      - source_labels: [__meta_docker_container_image]
        target_label: image
    pipeline_stages:
      # Parse JSON log lines from Spring Boot (logback structured output)
      - json:
          expressions:
            level:   level
            logger:  logger
            message: message
      - labels:
          level:
          logger:
      - output:
          source: message
