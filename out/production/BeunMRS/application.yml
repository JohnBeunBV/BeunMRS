spring:
  application:
    name: notification-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:notification-db}:5432/${DB_NAME:notifications}
    username: ${DB_USER:notify}
    password: ${DB_PASSWORD:notify_secret}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10

  rabbitmq:
    host: ${RABBITMQ_HOST:rabbitmq}
    port: 5672
    username: ${RABBITMQ_USER:rabbit}
    password: ${RABBITMQ_PASSWORD:rabbit_secret}
    virtual-host: ${RABBITMQ_VHOST:openmrs}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          initial-interval: 3s
          max-attempts: 5
          multiplier: 2.0
          max-interval: 30s

# ── OpenMRS ────────────────────────────────────────────────────────────────
openmrs:
  base-url: ${OPENMRS_BASE_URL:http://openmrs-gateway/openmrs}
  api:
    username: ${OPENMRS_API_USER:admin}
    password: ${OPENMRS_API_PASSWORD:Admin1234}

# ── FakeComWorld ───────────────────────────────────────────────────────────
fakecomworld:
  base-url:      ${FAKECOMWORLD_BASE_URL:http://fakecomworld:8080}
  student-group: ${STUDENT_GROUP_HEADER:group-1}

# ── Provider credentials ───────────────────────────────────────────────────
provider:
  swiftsend:
    api-key: ${SWIFTSEND_API_KEY:your-api-key-here}
  securepost:
    client-id:     ${SECUREPOST_CLIENT_ID:securepost-client-id}
    client-secret: ${SECUREPOST_CLIENT_SECRET:securepost-secret-key}
  legacylink:
    username: ${LEGACYLINK_USERNAME:legacylink-user}
    password: ${LEGACYLINK_PASSWORD:legacylink-password}
  asyncflow:
    api-key: ${ASYNCFLOW_API_KEY:asyncflow-api-key}

# ── Poller ─────────────────────────────────────────────────────────────────
poller:
  interval:
    fixed-delay-ms:   ${POLLER_INTERVAL_MS:120000}   # 2 min
    initial-delay-ms: 30000                            # wait 30s after startup

# ── AsyncFlow status polling ───────────────────────────────────────────────
asyncflow:
  poll:
    interval-ms: 10000   # 10s

# ── RabbitMQ queue names ───────────────────────────────────────────────────
rabbitmq:
  queue:
    appointments: appointments
    cancelled:    appointment.cancelled

# ── Loki logging (via logback-loki appender) ──────────────────────────────
loki:
  url: ${LOKI_URL:http://loki:3100/loki/api/v1/push}

# ── Actuator ──────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

server:
  port: 8080
