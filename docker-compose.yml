version: "3.9"

# ─────────────────────────────────────────────
# OpenMRS Communication Platform — Full Stack
# ─────────────────────────────────────────────
# Services:
#   openmrs          — OpenMRS reference application
#   openmrs-db       — MySQL for OpenMRS
#   notification-svc — Custom SaaS notification service (this repo)
#   notification-db  — PostgreSQL for notification service
#   rabbitmq         — Message broker (OpenMRS → notification-svc)
# ─────────────────────────────────────────────

networks:
  openmrs-net:
    driver: bridge
  notification-net:
    driver: bridge
  broker-net:
    driver: bridge

volumes:
  openmrs-data:
  openmrs-mysql-data:
  notification-pg-data:
  rabbitmq-data:

services:

  # ── OpenMRS ──────────────────────────────────────────────────────────────
  openmrs:
    image: openmrs/openmrs-reference-application-distro:${OPENMRS_VERSION:-nightly}
    container_name: openmrs
    restart: unless-stopped
    depends_on:
      openmrs-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DB_DATABASE: ${OPENMRS_DB_NAME:-openmrs}
      DB_HOST: openmrs-db
      DB_USERNAME: ${OPENMRS_DB_USER:-openmrs}
      DB_PASSWORD: ${OPENMRS_DB_PASSWORD:?OPENMRS_DB_PASSWORD is required}
      DB_CREATE_TABLES: "true"
      DB_AUTO_UPDATE: "true"
      MODULE_WEB_ADMIN: "true"
    volumes:
      - openmrs-data:/openmrs/data
      - ./openmrs/modules:/openmrs/data/modules   # drop extra .omod files here
      - ./openmrs/config:/openmrs/data/config     # runtime config overrides
    networks:
      - openmrs-net
      - broker-net
    ports:
      - "${OPENMRS_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/openmrs/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  openmrs-db:
    image: mysql:8.0
    container_name: openmrs-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${OPENMRS_DB_NAME:-openmrs}
      MYSQL_USER: ${OPENMRS_DB_USER:-openmrs}
      MYSQL_PASSWORD: ${OPENMRS_DB_PASSWORD:?OPENMRS_DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${OPENMRS_DB_ROOT_PASSWORD:?OPENMRS_DB_ROOT_PASSWORD is required}
    volumes:
      - openmrs-mysql-data:/var/lib/mysql
    networks:
      - openmrs-net
    command: >
      --character-set-server=utf8
      --collation-server=utf8_general_ci
      --log-bin-trust-function-creators=1
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${OPENMRS_DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── RabbitMQ ─────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?RABBITMQ_PASSWORD is required}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-openmrs}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
      - ./infra/rabbitmq/definitions:/etc/rabbitmq/definitions  # pre-seed exchanges/queues
      - ./infra/rabbitmq/config/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    networks:
      - broker-net
      - notification-net
    ports:
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"   # management UI (restrict in prod)
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Notification Service ──────────────────────────────────────────────────
  notification-svc:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_OWNER:?IMAGE_OWNER is required}/notification-svc:${IMAGE_TAG:-latest}
    container_name: notification-svc
    restart: unless-stopped
    depends_on:
      notification-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: postgresql://${NOTIFICATION_DB_USER:-notify}:${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}@notification-db:5432/${NOTIFICATION_DB_NAME:-notifications}
      # Broker
      RABBITMQ_URL: amqp://${RABBITMQ_USER:-rabbit}:${RABBITMQ_PASSWORD}@rabbitmq:5672/${RABBITMQ_VHOST:-openmrs}
      # OpenMRS REST (for polling / catch-up reconciliation)
      OPENMRS_BASE_URL: http://openmrs:8080/openmrs
      OPENMRS_API_USER: ${OPENMRS_API_USER:-admin}
      OPENMRS_API_PASSWORD: ${OPENMRS_API_PASSWORD:?OPENMRS_API_PASSWORD is required}
      # App
      APP_ENV: ${APP_ENV:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    networks:
      - notification-net
      - broker-net
    ports:
      - "${NOTIFICATION_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  notification-db:
    image: postgres:16-alpine
    container_name: notification-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${NOTIFICATION_DB_NAME:-notifications}
      POSTGRES_USER: ${NOTIFICATION_DB_USER:-notify}
      POSTGRES_PASSWORD: ${NOTIFICATION_DB_PASSWORD:?NOTIFICATION_DB_PASSWORD is required}
    volumes:
      - notification-pg-data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d   # seed scripts
    networks:
      - notification-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${NOTIFICATION_DB_USER:-notify} -d ${NOTIFICATION_DB_NAME:-notifications}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
